name: "i18n completeness"

on:
  pull_request:
    branches:
      - main
    paths:
      - "content/**"
      - "i18n/**"
      - "config.toml"
      - "config/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check:
    name: Translation coverage
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.JINX_APP_ID }}
          private-key: ${{ secrets.JINX_PRIVATE_KEY }}
          owner: rladies

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect configured languages
        id: langs
        run: |
          langs=$(grep -oE '^\[Languages\.([a-z]{2})\]' config.toml \
            | sed -E 's/^\[Languages\.([a-z]{2})\]/\1/' \
            | tr '\n' ' ' \
            | sed 's/ $//')
          if [ -z "$langs" ]; then
            langs="en"
          fi
          echo "list=$langs" >> $GITHUB_OUTPUT
          echo "Configured languages: $langs"

      - name: Check content page translations
        id: pages
        env:
          LANGS: ${{ steps.langs.outputs.list }}
        run: |
          cat > check-content.sh << 'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          BASE_LANG="en"

          CHANGED_DIRS=$(git diff --name-only origin/main...HEAD -- content/ \
            | xargs -I{} dirname {} \
            | sort -u \
            | grep -Ev '(^|/)_[^/]+(/|$)' \
            || true)

          MISSING=""
          for dir in $CHANGED_DIRS; do
            [ ! -d "$dir" ] && continue
            shopt -s nullglob
            pages=("$dir"/_index*.md "$dir"/index*.md)
            shopt -u nullglob
            [ ${#pages[@]} -eq 0 ] && continue
            for lang in $LANGS; do
              if [ "$lang" = "$BASE_LANG" ]; then
                found=false
                for f in "$dir"/_index.md "$dir"/_index.en.md "$dir"/index.md "$dir"/index.en.md; do
                  [ -f "$f" ] && found=true && break
                done
              else
                found=false
                for f in "$dir"/_index.${lang}.md "$dir"/index.${lang}.md; do
                  [ -f "$f" ] && found=true && break
                done
              fi
              if [ "$found" = "false" ]; then
                MISSING="$MISSING\n$dir ($lang)"
              fi
            done
          done

          if [ -n "$MISSING" ]; then
            echo "missing_content=true" >> $GITHUB_OUTPUT
            echo -e "$MISSING" > missing-content.txt
          else
            echo "missing_content=false" >> $GITHUB_OUTPUT
          fi
          BASH
          chmod +x check-content.sh
          ./check-content.sh

      - name: Check i18n strings (optional)
        id: strings
        run: |
          if [ ! -d "i18n" ]; then
            echo "No i18n/ directory yet — skipping string check."
            echo "checked=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          cat > check-strings.js << 'SCRIPT'
          const fs = require('fs');
          const path = require('path');

          const i18nDir = 'i18n';
          const baseLang = 'en';

          function parseKeys(filePath) {
            const content = fs.readFileSync(filePath, 'utf8');
            const keys = new Set();
            for (const line of content.split('\n')) {
              const match = line.match(/^([a-z0-9_-]+):/i);
              if (match) keys.add(match[1]);
            }
            return keys;
          }

          const baseFile = path.join(i18nDir, `${baseLang}.yaml`);
          if (!fs.existsSync(baseFile)) process.exit(0);

          const baseKeys = parseKeys(baseFile);
          const langs = fs.readdirSync(i18nDir)
            .filter(f => f.endsWith('.yaml'))
            .map(f => path.basename(f, '.yaml'))
            .filter(l => l !== baseLang);

          let md = '';
          let hasMissing = false;

          for (const lang of langs) {
            const langKeys = parseKeys(path.join(i18nDir, `${lang}.yaml`));
            const missing = [...baseKeys].filter(k => !langKeys.has(k));
            if (missing.length > 0) {
              hasMissing = true;
              md += `**${lang}** is missing ${missing.length} key(s): ${missing.map(k => '`' + k + '`').join(', ')}\n`;
            }
          }

          fs.writeFileSync('i18n-strings.md', md || '');
          fs.writeFileSync('has-i18n-issues.txt', hasMissing ? 'true' : 'false');
          SCRIPT
          node check-strings.js
          echo "checked=true" >> $GITHUB_OUTPUT

      - name: Post i18n comment
        uses: actions/github-script@v9
        if: always()
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            let md = '## i18n Coverage\n\n';

            const stringReport = fs.existsSync('i18n-strings.md')
              ? fs.readFileSync('i18n-strings.md', 'utf8') : '';
            const contentMissing = fs.existsSync('missing-content.txt')
              ? fs.readFileSync('missing-content.txt', 'utf8').trim() : '';

            if (!stringReport && !contentMissing) {
              md += ':white_check_mark: All translations are up to date.\n';
            } else {
              if (stringReport) {
                md += '### i18n strings\n\n' + stringReport + '\n';
              }
              if (contentMissing) {
                md += '### Content pages missing translations\n\n';
                md += 'These changed content directories are missing translations:\n\n';
                for (const line of contentMissing.split('\n').filter(Boolean)) {
                  md += `- \`${line.trim()}\`\n`;
                }
                md += '\n> Translations are recommended for all configured languages. ';
                md += 'Missing language files fall back to the default content language.\n';
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## i18n Coverage';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            const body = md + '\n\n*Updated: ' + new Date().toISOString() + '*';
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
